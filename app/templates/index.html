{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    {% if settings.header_image %}
    <img src="/static/uploads/{{ settings.header_image }}" class="img-fluid rounded mb-4 w-100" style="max-height:300px;object-fit:cover;">
    {% endif %}
    <div class="card shadow p-4 mb-4">
      <h1 class="text-center fw-bold" style="color:#8B0000;">🪶 {{ settings.petition_title }}</h1>
      <hr>
      <p class="lead">{{ settings.petition_text }}</p>
      <hr>
      <h5>📊 Signature Progress</h5>
      <div class="progress mb-2" style="height:30px;">
        <div class="progress-bar bg-danger fw-bold" id="prog-bar" style="width:{{ percent }}%;">{{ percent }}%</div>
      </div>
      <p class="text-muted" id="sig-count"><strong>{{ count }}</strong> of <strong>{{ settings.target_signatures }}</strong> signatures</p>
      <div class="text-center mt-3 d-flex justify-content-center gap-3 flex-wrap">
        <a href="{{ url_for('main_bp.view_ordinance') }}" class="btn btn-warning btn-lg px-5">📜 Read the Ordinance</a>
        <a href="{{ url_for('main_bp.sign') }}" class="btn btn-tribal btn-lg px-5">✍️ Sign Now</a>
      </div>
    </div>
  </div>
</div>
<script>
setInterval(function(){
  fetch('/progress').then(r=>r.json()).then(d=>{
    document.getElementById('prog-bar').style.width=d.percent+'%';
    document.getElementById('prog-bar').innerText=d.percent+'%';
    document.getElementById('sig-count').innerHTML='<strong>'+d.count+'</strong> of <strong>'+d.target+'</strong> signatures';
  });
},15000);
</script>
{% endblock %}
