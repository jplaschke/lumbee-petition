<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark" style="background:#8B0000;">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{{ url_for('admin_bp.dashboard') }}">🪶 Admin Panel</a>
      <div>
        <a href="{{ url_for('admin_bp.dashboard') }}" class="btn btn-sm btn-outline-light me-2">Dashboard</a>
        <a href="{{ url_for('admin_bp.signers_report') }}" class="btn btn-sm btn-outline-light me-2">Signers Report</a>
        <a href="{{ url_for('admin_bp.settings') }}" class="btn btn-sm btn-outline-light me-2">Settings</a>
        <a href="{{ url_for('main_bp.index') }}" class="btn btn-sm btn-outline-light me-2">View Site</a>
        <a href="{{ url_for('admin_bp.logout') }}" class="btn btn-sm btn-light">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show">
        {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
