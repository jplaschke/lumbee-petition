<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-danger mb-4">
  <div class="container">
    <span class="navbar-brand fw-bold">🪶 Petition Admin</span>
    <div>
      <a href="/admin/dashboard" class="btn btn-sm btn-outline-light me-2">Dashboard</a>
      <a href="/admin/signers"   class="btn btn-sm btn-outline-light me-2">Signers</a>
      <a href="/admin/settings"  class="btn btn-sm btn-outline-light me-2">Settings</a>
      <a href="/admin/logout"    class="btn btn-sm btn-light">Logout</a>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat,msg in messages %}
      <div class="alert alert-{{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
