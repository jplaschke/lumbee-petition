<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Panel</title>
</head>
<body>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div>{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}

</body>
</html>
