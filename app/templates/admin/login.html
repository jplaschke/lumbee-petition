<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin Login</title>
</head>
<body>
  <h3>🪶 Admin Login</h3>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div>{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <form method="POST" action="{{ url_for('admin_bp.login') }}">
    {{ form.hidden_tag() }}

    <div>
      {{ form.username.label }}
      {{ form.username }}
    </div>

    <div>
      {{ form.password.label }}
      {{ form.password }}
    </div>

    <div>
      {{ form.submit }}   <!-- ✅ not submit() -->
    </div>
  </form>
</body>
</html>
