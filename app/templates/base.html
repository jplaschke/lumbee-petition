<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ settings.petition_title }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
  background-color: {{ settings.background_color or '#8B0000' }};
  {% if settings.background_image %}
  background-image: url('/static/uploads/{{ settings.background_image }}');
  background-size: cover;
  background-attachment: fixed;
  {% endif %}
  color: #fff;
  min-height: 100vh;
}
.card { background: rgba(255,255,255,0.95); color: #333; }
.navbar { background: rgba(0,0,0,0.5) !important; }
.btn-tribal { background-color: #8B0000; color: white; border: none; }
.btn-tribal:hover { background-color: #6b0000; color: white; }
</style>
</head>
<body>
<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('main_bp.index') }}">🪶 {{ settings.petition_title }}</a>
    <div>
      <a href="{{ url_for('main_bp.index') }}" class="btn btn-sm btn-outline-light me-2">Home</a>
      <a href="{{ url_for('main_bp.print_ordinance') }}" class="btn btn-sm btn-warning me-2">📜 Ordinance</a>
      <a href="{{ url_for('main_bp.sign_petition') }}" class="btn btn-sm btn-light">Sign Petition</a>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} alert-dismissible fade show">
          {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
