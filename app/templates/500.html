<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 – Server Error</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            text-align: center;
            padding: 3rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { font-size: 5rem; color: #fd7e14; margin: 0; }
        h2 { color: #343a40; }
        p  { color: #6c757d; }
        a  {
            display: inline-block;
            margin-top: 1rem;
            padding: 0.6rem 1.4rem;
            background: #0d6efd;
            color: white;
            border-radius: 6px;
            text-decoration: none;
        }
        a:hover { background: #0b5ed7; }
    </style>
</head>
<body>
    <div class="box">
        <h1>500</h1>
        <h2>Internal Server Error</h2>
        <p>Something went wrong on our end. We're working on it.</p>
        <a href="/">← Go Home</a>
    </div>
</body>
</html>
